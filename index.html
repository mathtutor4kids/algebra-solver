<!DOCTYPE html>
<html>
<head>
  <title>Algebra Solver</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; }
    .container { max-width:700px; margin:40px auto; background:#111827; padding:20px; border-radius:10px; }
    textarea { width:100%; height:120px; }
    button { width:100%; padding:10px; margin-top:10px; }
    #result { margin-top:20px; background:#1f2937; padding:15px; border-radius:10px; }
  </style>
</head>

<body>

<div class="container">
  <h2>Algebra Solver</h2>

  <textarea id="input" placeholder="Type problem here..."></textarea>

  <button onclick="solve()">Solve</button>

  <div id="result"></div>
</div>

<script>
function solve() {
  let text = document.getElementById("input").value.toLowerCase();
  let result = document.getElementById("result");

  // safety check
  if (!text) {
    result.innerHTML = "Please enter a problem.";
    return;
  }

  // linear equation detection
  let eqMatch = text.match(/([+-]?\d*)x\s*([+-]\s*\d+)?\s*=\s*([+-]?\d+)/);

  if (eqMatch) {
    let a = eqMatch[1];
    let b = eqMatch[2];
    let c = eqMatch[3];

    a = (a === "" || a === "+") ? 1 : (a === "-") ? -1 : parseInt(a);
    b = b ? parseInt(b.replace(/\s/g, "")) : 0;
    c = parseInt(c);

    let x = (c - b) / a;

    result.innerHTML =
      "Linear Equation<br><br>" +
      "x = " + x;

    return;
  }

  // fencing problem
  if (text.includes("fencing") || text.includes("garden") || text.includes("wall")) {
    let P = 100;

    let x = P / 4;
    let y = P / 2;
    let area = x * y;

    result.innerHTML =
      "Optimization Problem<br><br>" +
      "Width = " + x + "<br>" +
      "Length = " + y + "<br>" +
      "Max Area = " + area;

    return;
  }

  result.innerHTML = "Problem not recognized yet.";
}
</script>

</body>
</html>
