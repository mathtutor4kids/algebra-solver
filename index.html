<!DOCTYPE html>
<html>
<head>
<title>Algebra Helper</title>
<style>
body {
font-family: Arial;
background: #f5f7fb;
padding: 40px;
text-align: center;
}
.container {
background: white;
padding: 25px;
border-radius: 10px;
max-width: 600px;
margin: auto;
box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
textarea {
width: 100%;
height: 100px;
margin-top: 10px;
padding: 10px;
}
button {
margin-top: 15px;
padding: 10px 20px;
background: black;
color: white;
border: none;
cursor: pointer;
}
#result {
margin-top: 20px;
text-align: left;
background: #eef;
padding: 15px;
border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">
<h1>Algebra Solver</h1>
<p>Enter any algebra question. Get step-by-step explanation.</p>

<textarea id="question" placeholder="Example: Solve 2x + 5 = 15"></textarea>
<br>
<button onclick="solve()">Solve</button>

<div id="result"></div>
</div>

<script>
async function solve() {
const question = document.getElementById("question").value;
const resultDiv = document.getElementById("result");

resultDiv.innerHTML = "Solving...";

const response = await fetch("https://api.openai.com/v1/chat/completions", {
method: "POST",
headers: {
"Content-Type": "application/json",

},
body: JSON.stringify({
model: "gpt-4o-mini",
messages: [
{
role: "system",
content: "You are a helpful math tutor. Explain algebra solutions step-by-step in very simple terms for a high school student."
},
{
role: "user",
content: question
}
]
})
});

const data = await response.json();
const answer = data.choices[0].message.content;

resultDiv.innerHTML = answer.replace(/\n/g, "<br>");
}
</script>

</body>
</html>
