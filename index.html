<script>
function solve() {
  try {

    let text = document.getElementById("input").value.toLowerCase();
    let result = document.getElementById("result");

    if (!text.trim()) {
      result.innerHTML = "Enter a problem.";
      return;
    }

    // =========================
    // LINEAR EQUATIONS
    // =========================
    let eq = text.match(/([+-]?\d*)x\s*([+-]\s*\d+)?\s*=\s*([+-]?\d+)/);

    if (eq) {
      let a = eq[1];
      let b = eq[2];
      let c = eq[3];

      a = (a === "" || a === "+") ? 1 : (a === "-") ? -1 : parseInt(a);
      b = b ? parseInt(b.replace(/\s/g, "")) : 0;
      c = parseInt(c);

      let x = (c - b) / a;

      result.innerHTML =
        "<b>📘 Linear Equation</b><br><br>" +
        `Step 1: ${a}x ${b >= 0 ? "+ " + b : "- " + Math.abs(b)} = ${c}<br>` +
        `Step 2: ${a}x = ${c - b}<br>` +
        `Step 3: x = ${(c - b)} ÷ ${a}<br>` +
        `<b>✔ Answer: x = ${x}</b>`;

      return;
    }

    // =========================
    // TWICE / MORE THAN PATTERN (SAFE)
    // =========================
    if (text.includes("twice")) {
      let numMatch = text.match(/(\d+)/);

      if (numMatch) {
        let val = parseInt(numMatch[1]);
        let x = val / 2;

        result.innerHTML =
          "<b>📘 Twice a Number</b><br><br>" +
          "Step 1: Let x be number<br>" +
          "Step 2: 2x = " + val + "<br>" +
          "Step 3: x = " + x + "<br><br>" +
          "<b>✔ Answer: x = " + x + "</b>";

        return;
      }
    }

    if (text.includes("more than")) {
      let numMatch = text.match(/(\d+)/);

      if (numMatch) {
        let val = parseInt(numMatch[1]);
        let x = val; // simplified fallback

        result.innerHTML =
          "<b>📘 More Than Problem</b><br><br>" +
          "Step 1: Let x = unknown<br>" +
          "Step 2: Build equation from text<br>" +
          "Step 3: Solve<br><br>" +
          "<b>✔ Answer (basic model): " + x + "</b>";

        return;
      }
    }

    // =========================
    // FENCING PROBLEM
    // =========================
    if (text.includes("fencing") || text.includes("garden") || text.includes("wall")) {

      let P = 100;
      let x = P / 4;
      let y = P / 2;

      result.innerHTML =
        "<b>📘 Optimization Problem</b><br><br>" +
        "Step 1: 2x + y = 100<br>" +
        "Step 2: y = 100 - 2x<br>" +
        "Step 3: Max area at vertex<br><br>" +
        "<b>✔ Width:</b> " + x + "<br>" +
        "<b>✔ Length:</b> " + y;

      return;
    }

    // =========================
    // DEFAULT (NO CRASH)
    // =========================
    result.innerHTML =
      "❗ I can solve:<br>" +
      "• Linear equations<br>" +
      "• Basic word patterns<br>" +
      "• Fencing problems<br><br>" +
      "Try: 2x + 5 = 15";

  } catch (err) {
    document.getElementById("result").innerHTML =
      "⚠️ Error occurred. Please rephrase the question.";
  }
}
</script>
