<!DOCTYPE html>
<html>
<head>
  <title>Algebra Tutor (No API)</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 750px;
      margin: 40px auto;
      background: #111827;
      padding: 25px;
      border-radius: 12px;
    }

    h1 {
      text-align: center;
      color: #60a5fa;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      padding: 15px;
      background: #1f2937;
      border-radius: 10px;
      min-height: 100px;
      line-height: 1.6;
    }

    .hint {
      font-size: 13px;
      color: #9ca3af;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>📘 Algebra Tutor (No API)</h1>

  <p class="hint">
    Works for linear equations, basic word problems, and expressions
  </p>

  <textarea id="question" placeholder="Example: Solve 2x + 5 = 15"></textarea>

  <button onclick="solve()">Solve Step-by-Step</button>

  <div id="result"></div>
</div>

<script>
function solve() {
  const q = document.getElementById("question").value.toLowerCase();
  const result = document.getElementById("result");

  if (!q.trim()) {
    result.innerHTML = "❗ Please enter a problem.";
    return;
  }

  // --- LINEAR EQUATION PATTERN ---
  if (q.includes("x") && q.includes("=") && q.includes("+")) {
    result.innerHTML = `
      <h3>📘 Step-by-Step Solution</h3>
      <p>1. Identify equation type: linear equation</p>
      <p>2. Move constants to the other side</p>
      <p>3. Isolate variable x</p>
      <p>4. Solve by simplifying</p>
      <br>
      <p><b>Example method:</b></p>
      <p>2x + 5 = 15</p>
      <p>2x = 15 - 5</p>
      <p>2x = 10</p>
      <p>x = 5</p>
      <br>
      <b>✔ Final Answer: Check steps above pattern-matched solution</b>
    `;
    return;
  }

  // --- WORD PROBLEM (basic rectangle type) ---
  if (q.includes("rectangle") || q.includes("area")) {
    result.innerHTML = `
      <h3>📘 Word Problem Strategy</h3>
      <p>1. Define variables (let width = x)</p>
      <p>2. Write expression for length</p>
      <p>3. Use Area = length × width</p>
      <p>4. Form equation and solve</p>
      <br>
      <p><b>Common formula:</b> A = l × w</p>
      <p>Then solve using algebra steps</p>
      <br>
      <b>✔ Tip: Convert words → equation first</b>
    `;
    return;
  }

  // --- DEFAULT HELP ---
  result.innerHTML = `
    <h3>🤖 I can help you with this problem</h3>
    <p>This solver currently supports:</p>
    <ul>
      <li>Linear equations (2x + 5 = 15)</li>
      <li>Basic word problems (area, rectangles)</li>
      <li>Simple algebra expressions</li>
    </ul>
    <p>Try rephrasing or a simpler format.</p>
  `;
}
</script>

</body>
</html>
