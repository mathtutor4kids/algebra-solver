<script>
function solve() {
  let text = document.getElementById("input").value.toLowerCase();
  let result = document.getElementById("result");

  // =========================
  // 1. LINEAR EQUATIONS
  // =========================
  let eqMatch = text.match(/([+-]?\d*)x\s*([+-]\s*\d+)?\s*=\s*([+-]?\d+)/);

  if (eqMatch) {
    let a = eqMatch[1];
    let b = eqMatch[2];
    let c = eqMatch[3];

    a = (a === "" || a === "+") ? 1 : (a === "-") ? -1 : parseInt(a);
    b = b ? parseInt(b.replace(/\s/g, "")) : 0;
    c = parseInt(c);

    let x = (c - b) / a;

    result.innerHTML = `
      <b>📘 Linear Equation</b><br><br>
      Step 1: Move constant<br>
      ${a}x = ${c - b}<br><br>

      Step 2: Divide<br>
      x = ${x}<br><br>

      <b>✔ Answer: x = ${x}</b>
    `;
    return;
  }

  // =========================
  // 2. FENCING / OPTIMIZATION PROBLEMS
  // =========================
  if (text.includes("fencing") || text.includes("garden") || text.includes("wall")) {

    let P = 100; // default perimeter

    result.innerHTML = `
      <b>📘 Optimization Problem (Fence with one wall)</b><br><br>

      Step 1: Let width = x<br>
      Step 2: Only 3 sides are fenced<br>
      Step 3: So equation: 2x + y = ${P}<br><br>

      Step 4: Solve for y:<br>
      y = ${P} - 2x<br><br>

      Step 5: Area function:<br>
      A = x(${P} - 2x)<br>
      A = ${P}x - 2x²<br><br>

      Step 6: Maximum area occurs at vertex:<br>
      x = -b / (2a)<br>
      x = -${P} / (2 × -2)<br>
      x = ${P / 4}<br><br>

      Step 7: Find y:<br>
      y = ${P} - 2(${P / 4}) = ${P / 2}<br><br>

      <b>✔ Dimensions:</b><br>
      Width (x) = ${P / 4} ft<br>
      Length (y) = ${P / 2} ft<br><br>

      <b>✔ Maximum Area:</b><br>
      A = ${P / 4} × ${P / 2} = ${(P * P) / 8} sq ft
    `;
    return;
  }

  // =========================
  // DEFAULT
  // =========================
  result.innerHTML = `
    ❗ Supported problems:<br>
    • Linear equations (2x + 5 = 15)<br>
    • Fencing / optimization problems<br><br>

    Try rephrasing your question.
  `;
}
</script>
