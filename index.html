<!DOCTYPE html>
<html>
<head>
  <title>Smart Algebra Solver</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      background: #111827;
      padding: 25px;
      border-radius: 12px;
    }

    h1 {
      text-align: center;
      color: #60a5fa;
    }

    textarea {
      width: 100%;
      height: 110px;
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
    }

    #result {
      margin-top: 20px;
      background: #1f2937;
      padding: 15px;
      border-radius: 10px;
      line-height: 1.6;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>📘 Smart Algebra Solver (No API)</h1>

  <textarea id="input" placeholder="Try:
2x + 5 = 15
OR:
A rectangle has length 5 more than width and area 84"></textarea>

  <button onclick="solve()">Solve</button>

  <div id="result"></div>
</div>

<script>
function solve() {
  let text = document.getElementById("input").value.toLowerCase();
  let result = document.getElementById("result");

  // =========================
  // 1. LINEAR EQUATIONS
  // =========================
  let eqMatch = text.match(/([+-]?\d*)x\s*([+-]\s*\d+)?\s*=\s*([+-]?\d+)/);

  if (eqMatch) {
    let a = eqMatch[1];
    let b = eqMatch[2];
    let c = eqMatch[3];

    a = (a === "" || a === "+") ? 1 : (a === "-") ? -1 : parseInt(a);
    b = b ? parseInt(b.replace(/\s/g, "")) : 0;
    c = parseInt(c);

    let step1 = c - b;
    let x = step1 / a;

    result.innerHTML = `
      <b>📘 Linear Equation Solution</b><br><br>
      Step 1: Move constant to right side<br>
      ${a}x = ${c - b}<br><br>

      Step 2: Divide both sides by ${a}<br>
      x = ${(c - b)} / ${a}<br><br>

      <b>✔ Final Answer: x = ${x}</b>
    `;
    return;
  }

  // =========================
  // 2. RECTANGLE WORD PROBLEM
  // =========================
  if (text.includes("rectangle") && text.includes("area")) {
    result.innerHTML = `
      <b>📘 Rectangle Word Problem</b><br><br>

      Step 1: Let width = x<br>
      Step 2: Let length = x + k (difference given in question)<br>
      Step 3: Use formula A = l × w<br>
      Step 4: Build equation<br>
      Step 5: Solve for x<br><br>

      ✔ Tip: Convert words → equation first
    `;
    return;
  }

  // =========================
  // 3. AGE PROBLEMS
  // =========================
  if (text.includes("age")) {
    result.innerHTML = `
      <b>📘 Age Problem Strategy</b><br><br>
      Step 1: Let current age = x<br>
      Step 2: Future/past = x ± number<br>
      Step 3: Form equation using condition<br>
      Step 4: Solve like linear equation<br><br>

      ✔ Tip: Track time changes carefully
    `;
    return;
  }

  // =========================
  // DEFAULT
  // =========================
  result.innerHTML = `
    ❗ I can currently solve:<br>
    • Linear equations (2x + 5 = 15)<br>
    • Basic rectangle word problems<br>
    • Age problems<br><br>

    Try rewriting your question in a simpler format.
  `;
}
</script>

</body>
</html>
