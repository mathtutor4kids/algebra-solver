<!DOCTYPE html>
<html>
<head>
  <title>Algebra Solver Pro</title>

  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 750px;
      margin: 40px auto;
      background: #111827;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      color: #60a5fa;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      outline: none;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    #result {
      margin-top: 20px;
      padding: 15px;
      background: #1f2937;
      border-radius: 10px;
      min-height: 120px;
      line-height: 1.6;
    }

    .hint {
      font-size: 13px;
      color: #9ca3af;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>📘 Algebra Solver (Grades 8–12)</h1>

  <p class="hint">
    Works for equations, inequalities, word problems, and geometry basics
  </p>

  <textarea id="question" placeholder="Example: A rectangle has length 5 more than width and area is 84. Find dimensions."></textarea>

  <button onclick="solve()">Solve Step-by-Step</button>

  <div id="result"></div>
</div>

<script>
async function solve() {
  const question = document.getElementById("question").value;
  const resultDiv = document.getElementById("result");

  if (!question.trim()) {
    resultDiv.innerHTML = "❗ Please enter a problem.";
    return;
  }

  // Faster-feel UI (instant response effect)
  let dots = 0;
  resultDiv.innerHTML = "🧠 Thinking";
  const loading = setInterval(() => {
    dots = (dots + 1) % 4;
    resultDiv.innerHTML = "🧠 Solving" + ".".repeat(dots);
  }, 300);

  try {
    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer YOUR_API_KEY_HERE"
      },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages: [
          {
            role: "system",
            content: `
You are an expert Algebra 1 & 2 tutor.

Rules:
- Solve step-by-step clearly
- Keep explanations simple for high school students
- Handle word problems by defining variables first
- Show equations clearly
- Final answer must be clearly labeled
- Do NOT be overly long
- Always structure:
  1. Understand problem
  2. Define variables
  3. Build equation
  4. Solve step-by-step
  5. Final answer
            `
          },
          {
            role: "user",
            content: question
          }
        ]
      })
    });

    const data = await response.json();
    const answer = data.choices[0].message.content;

    clearInterval(loading);

    resultDiv.innerHTML = answer.replace(/\n/g, "<br>");

    MathJax.typesetPromise();

  } catch (error) {
    clearInterval(loading);
    resultDiv.innerHTML = "❌ Error solving problem. Check API key or connection.";
  }
}
</script>

</body>
</html>
